{% extends "base.html" %}
{% block content %}

<p>you are making payment of {{ booking.schedule.price }} To {{ booking.seat.bus.company }}</p>
<form action="" method ='post'>

    <button type="submit" name="action" value="cancel">Cancel</button>
</form>
{% endblock content %}
