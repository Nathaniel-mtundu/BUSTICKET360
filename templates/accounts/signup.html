<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | BusTicket360</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:420px;
            background:white;
            padding:35px;
            border-radius:12px;
            box-shadow:0 8px 25px rgba(0,0,0,.15);
        }

        h2{
            text-align:center;
            color:#2c3e50;
            margin-bottom:10px;
        }

        p.subtitle{
            text-align:center;
            color:#777;
            margin-bottom:25px;
        }

        form p{
            margin-bottom:15px;
        }

        form label{
            display:block;
            margin-bottom:6px;
            font-weight:bold;
            color:#444;
        }

        form input,
        form select,
        form textarea{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:15px;
        }

        form input:focus{
            outline:none;
            border-color:#007bff;
        }

        button{
            width:100%;
            padding:13px;
            border:none;
            background:#007bff;
            color:white;
            font-size:16px;
            border-radius:6px;
            cursor:pointer;
            transition:.3s;
            margin-top:10px;
        }

        button:hover{
            background:#0056b3;
        }

        .login-link{
            text-align:center;
            margin-top:20px;
        }

        .login-link a{
            color:#007bff;
            text-decoration:none;
            font-weight:bold;
        }

        .login-link a:hover{
            text-decoration:underline;
        }

        .errorlist{
            color:red;
            list-style:none;
            margin-bottom:10px;
            padding-left:0;
            font-size:14px;
        }

        .helptext{
            display:block;
            font-size:12px;
            color:#666;
            margin-top:5px;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Create Account</h2>
    <p class="subtitle">Sign up to start booking your bus tickets.</p>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">
            Create Account
        </button>
    </form>

    <div class="login-link">
        Already have an account?
        <a href="{% url 'login' %}">Login</a>
    </div>

</div>

</body>
</html>
