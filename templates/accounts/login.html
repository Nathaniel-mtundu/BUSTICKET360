<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BusTicket360</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:420px;
            background:#fff;
            padding:35px;
            border-radius:12px;
            box-shadow:0 8px 25px rgba(0,0,0,.15);
        }

        h2{
            text-align:center;
            color:#2c3e50;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:#777;
            margin-bottom:25px;
        }

        .error-message{
            background:#fdecea;
            color:#b71c1c;
            border:1px solid #f5c6cb;
            padding:12px;
            border-radius:6px;
            margin-bottom:20px;
            text-align:center;
        }

        form p{
            margin-bottom:15px;
        }

        form label{
            display:block;
            margin-bottom:6px;
            font-weight:bold;
            color:#444;
        }

        form input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:15px;
        }

        form input:focus{
            outline:none;
            border-color:#007bff;
        }

        button{
            width:100%;
            padding:13px;
            background:#007bff;
            color:#fff;
            border:none;
            border-radius:6px;
            font-size:16px;
            cursor:pointer;
            transition:.3s;
            margin-top:10px;
        }

        button:hover{
            background:#0056b3;
        }

        .links{
            text-align:center;
            margin-top:20px;
            line-height:2;
        }

        .links a{
            color:#007bff;
            text-decoration:none;
            font-weight:bold;
        }

        .links a:hover{
            text-decoration:underline;
        }

        .helptext{
            display:block;
            font-size:12px;
            color:#666;
            margin-top:5px;
        }

        .errorlist{
            color:red;
            list-style:none;
            padding-left:0;
            margin-bottom:10px;
            font-size:14px;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Welcome Back</h2>
    <p class="subtitle">Login to your BusTicket360 account</p>

    {% if form.errors %}
    <div class="error-message">
        Invalid username or password. Please try again.
    </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">
            Log In
        </button>
    </form>

    <div class="links">
        <a href="#">Forgot Password?</a><br>
        Don't have an account?
        <a href="{% url 'signup' %}">Create Account</a>
    </div>

</div>

</body>
</html>
